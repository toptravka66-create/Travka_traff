<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAVKA - Traffic Generation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            color: #00ff88;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px #00ff88;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #fff;
            line-height: 1.3;
        }

        .highlight { color: #00ff88; }

        p {
            font-size: 1.1rem;
            color: #b0b0b0;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: #00ff88;
            color: #0a0e27;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            margin: 0.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
        }

        .button:hover {
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.8);
            transform: translateY(-3px);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }

        .stat {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            padding: 1.5rem;
            border-radius: 10px;
        }

        .stat-value {
            font-size: 2rem;
            color: #00ff88;
            font-weight: bold;
        }

        .stat-label {
            color: #b0b0b0;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .button { padding: 0.8rem 1.5rem; font-size: 0.95rem; }
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">TRAVKA</div>
        
        <h1>
            <span class="highlight">Automate</span> Your Growth<br>
            Drive Real <span class="highlight">Traffic</span>
        </h1>

        <p>
            Dominate social media, acquire clients at scale, and accelerate revenue growth with cutting-edge automation technology.
        </p>

        <div class="stats">
            <div class="stat">
                <div class="stat-value">24/7</div>
                <div class="stat-label">Automation</div>
            </div>
            <div class="stat">
                <div class="stat-value">∞</div>
                <div class="stat-label">Traffic</div>
            </div>
            <div class="stat">
                <div class="stat-value">✓</div>
                <div class="stat-label">Conversion</div>
            </div>
        </div>

        <a href="https://t.me/soprano67_1" target="_blank" class="button">📱 Connect on Telegram</a>

        <p style="margin-top: 3rem; font-size: 0.9rem; color: #707070;">
            © 2026 TRAVKA. All rights reserved.
        </p>
    </div>
</body>
</html>
