<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAVKA - Traffic Generation & Automation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Animated background text */
        .background-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(8rem, 20vw, 20rem);
            font-weight: 900;
            letter-spacing: 2rem;
            text-align: center;
            z-index: 0;
            opacity: 0.12;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }

        .background-text.green {
            color: #00ff88;
            text-shadow: 0 0 40px #00ff88, 0 0 80px #00ff88;
            filter: drop-shadow(0 0 20px #00ff88);
        }

        .background-text.purple {
            color: #9d00ff;
            text-shadow: 0 0 40px #9d00ff, 0 0 80px #9d00ff;
            filter: drop-shadow(0 0 20px #9d00ff);
        }

        @keyframes float {
            0%, 100% {
                transform: translate(-50%, -50%) translateY(0);
            }
            50% {
                transform: translate(-50%, -50%) translateY(-20px);
            }
        }

        /* Glow effect overlay */
        .glow-overlay {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        .glow-overlay.green {
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%);
            top: 20%;
            right: 10%;
            filter: blur(40px);
            animation: moveGlow1 8s ease-in-out infinite;
        }

        .glow-overlay.purple {
            background: radial-gradient(circle, rgba(157, 0, 255, 0.1) 0%, transparent 70%);
            bottom: 20%;
            left: 10%;
            filter: blur(40px);
            animation: moveGlow2 10s ease-in-out infinite;
        }

        @keyframes moveGlow1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        @keyframes moveGlow2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, -30px); }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 900px;
            width: 100%;
        }

        /* Logo/Brand */
        .logo {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 0.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, #00ff88, #9d00ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* Headline */
        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            color: #ffffff;
            letter-spacing: -0.02em;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        .highlight-green {
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
        }

        .highlight-purple {
            color: #9d00ff;
            text-shadow: 0 0 20px #9d00ff;
        }

        /* Subheadline */
        .subheadline {
            font-size: clamp(1rem, 3vw, 1.25rem);
            color: #b0b0b0;
            margin-bottom: 3rem;
            line-height: 1.8;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Features list */
        .features {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 3rem;
            font-size: 0.95rem;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 50px;
            background: rgba(0, 255, 136, 0.05);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .feature:hover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .feature-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        /* CTA Button */
        .cta-button {
            display: inline-block;
            padding: 1rem 3rem;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-decoration: none;
            border: 2px solid #00ff88;
            background: linear-gradient(135deg, #00ff88 0%, #00cc6f 100%);
            color: #0a0e27;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.6);
            transform: translateY(-3px);
            letter-spacing: 0.1em;
        }

        .cta-button:active {
            transform: translateY(-1px);
        }

        /* Secondary button */
        .secondary-button {
            display: inline-block;
            margin-left: 1rem;
            padding: 1rem 3rem;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-decoration: none;
            border: 2px solid #9d00ff;
            background: rgba(157, 0, 255, 0.1);
            color: #9d00ff;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.2);
            text-transform: uppercase;
        }

        .secondary-button:hover {
            background: rgba(157, 0, 255, 0.2);
            box-shadow: 0 0 40px rgba(157, 0, 255, 0.4);
            transform: translateY(-3px);
        }

        /* Button container */
        .buttons {
            margin-bottom: 3rem;
        }

        @media (max-width: 768px) {
            .buttons {
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }

            .cta-button,
            .secondary-button {
                width: 100%;
                margin-left: 0;
            }

            h1 {
                font-size: 2rem;
            }

            .background-text {
                font-size: clamp(4rem, 15vw, 12rem);
                opacity: 0.08;
            }
        }

        /* Footer */
        .footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(0, 255, 136, 0.2);
            font-size: 0.85rem;
            color: #707070;
        }

        .social-links {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .social-links a {
            color: #00ff88;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            color: #9d00ff;
            text-shadow: 0 0 10px #9d00ff;
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
            color: #00ff88;
            z-index: 10;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        /* Dashboard Styles */
        .dashboard {
            margin: 3rem 0;
            padding: 2rem;
            background: rgba(0, 255, 136, 0.05);
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .dashboard h2 {
            color: #00ff88;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px #00ff88;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .stat-card {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #b0b0b0;
            margin-top: 0.5rem;
        }

        /* Contact Form */
        .contact-form-container {
            margin: 3rem 0;
            padding: 2rem;
            background: rgba(157, 0, 255, 0.05);
            border: 2px solid rgba(157, 0, 255, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .contact-form-container h3 {
            color: #9d00ff;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px #9d00ff;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .contact-form input,
        .contact-form textarea {
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(157, 0, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .contact-form input::placeholder,
        .contact-form textarea::placeholder {
            color: #707070;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            border-color: #9d00ff;
            background: rgba(157, 0, 255, 0.1);
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.2);
        }

        .form-note {
            text-align: center;
            color: #b0b0b0;
            font-size: 0.9rem;
        }

        .form-note a {
            color: #9d00ff;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .form-note a:hover {
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        /* Admin Panel Modal */
        .admin-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .admin-content {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            border: 2px solid #00ff88;
            border-radius: 15px;
            padding: 2rem;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: #00ff88;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            color: #9d00ff;
            transform: scale(1.2);
        }

        .admin-modal h2 {
            color: #00ff88;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px #00ff88;
        }

        .admin-modal h3 {
            color: #9d00ff;
            margin: 1.5rem 0 1rem 0;
            text-shadow: 0 0 10px #9d00ff;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .admin-stat {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            padding: 1rem;
            border-radius: 8px;
            color: #e0e0e0;
        }

        .admin-stat strong {
            color: #00ff88;
        }

        .inquiries-table {
            overflow-x: auto;
            margin: 1rem 0;
        }

        .inquiries-table table {
            width: 100%;
            border-collapse: collapse;
            color: #e0e0e0;
        }

        .inquiries-table th {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            padding: 1rem;
            text-align: left;
            border-bottom: 2px solid rgba(0, 255, 136, 0.3);
        }

        .inquiries-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
        }

        .inquiries-table tr:hover {
            background: rgba(0, 255, 136, 0.05);
        }

        @media (max-width: 768px) {
            .admin-content {
                padding: 1.5rem;
            }

            .inquiries-table {
                font-size: 0.85rem;
            }

            .inquiries-table th,
            .inquiries-table td {
                padding: 0.5rem;
            }
        }
</head>
<body>
    <!-- Animated background glows -->
    <div class="glow-overlay green"></div>
    <div class="glow-overlay purple"></div>

    <!-- Background text -->
    <div class="background-text green">T R A V K A</div>

    <!-- Main content -->
    <div class="container">
        <div class="logo">TRAVKA</div>

        <h1>
            <span class="highlight-green">Automate</span> Your Growth<br>
            <span class="highlight-purple">Drive</span> Real Traffic & <span class="highlight-green">Convert</span>
        </h1>

        <p class="subheadline">
            Dominate social media, acquire clients at scale, and accelerate revenue growth with cutting-edge automation technology.
        </p>

        <div class="features">
            <div class="feature">
                <span class="feature-dot"></span>
                <span>Social Media Automation</span>
            </div>
            <div class="feature">
                <span class="feature-dot"></span>
                <span>Client Acquisition</span>
            </div>
            <div class="feature">
                <span class="feature-dot"></span>
                <span>Traffic Generation</span>
            </div>
            <div class="feature">
                <span class="feature-dot"></span>
                <span>24/7 Optimization</span>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div class="dashboard">
            <h2>📊 Live Stats</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="stat-visitors">0</div>
                    <div class="stat-label">Visitors Today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-inquiries">0</div>
                    <div class="stat-label">Inquiries</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-conversion">0%</div>
                    <div class="stat-label">Conversion Rate</div>
                </div>
            </div>

        <!-- Contact Form -->
        <div class="contact-form-container">
            <h3>💬 Get Started Now</h3>
            <form id="contactForm" class="contact-form">
                <input type="text" id="name" placeholder="Your Name" required>
                <input type="email" id="email" placeholder="Your Email" required>
                <textarea id="message" placeholder="Tell us about your business..." rows="3" required></textarea>
                <button type="submit" class="cta-button">Send Inquiry</button>
            </form>
            <p class="form-note">Or connect directly on <a href="https://t.me/soprano67_1" target="_blank">Telegram @soprano67_1</a></p>
        </div>

        <div class="buttons">
            <a href="https://t.me/soprano67_1" class="cta-button" target="_blank" rel="noopener noreferrer">
                Join on Telegram
            </a>
            <a href="#admin" class="secondary-button" onclick="showAdmin(event)">Admin Panel</a>
        </div>

        <div class="footer">
            <p>Join hundreds of businesses automating their growth</p>
            <div class="social-links">
                <a href="https://t.me/soprano67_1" target="_blank" rel="noopener noreferrer">Telegram</a>
            </div>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div id="adminPanel" class="admin-modal" style="display:none;">
        <div class="admin-content">
            <button class="close-btn" onclick="closeAdmin()">✕</button>
            <h2>📈 Admin Dashboard</h2>
            
            <div class="admin-stats">
                <div class="admin-stat">
                    <strong>Total Visitors:</strong> <span id="admin-total-visitors">0</span>
                </div>
                <div class="admin-stat">
                    <strong>Total Inquiries:</strong> <span id="admin-total-inquiries">0</span>
                </div>
                <div class="admin-stat">
                    <strong>Conversion Rate:</strong> <span id="admin-conversion">0%</span>
                </div>
            </div>

            <h3>📋 Recent Inquiries</h3>
            <div class="inquiries-table">
                <table id="inquiriesTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Message</th>
                            <th>Time</th>
                            <th>Source</th>
                        </tr>
                    </thead>
                    <tbody id="inquiriesList">
                        <tr><td colspan="5" style="text-align:center; color:#aaa;">No inquiries yet</td></tr>
                    </tbody>
                </table>
            </div>

            <button onclick="exportData()" class="secondary-button" style="margin-top: 20px;">📥 Export to CSV</button>
        </div>
    </div>

    <script>
        // Analytics & Data Management
        class TravkaAnalytics {
            constructor() {
                this.storageKey = 'travka_analytics';
                this.inquiriesKey = 'travka_inquiries';
                this.init();
            }

            init() {
                this.trackVisitor();
                this.loadData();
                this.updateDashboard();
                this.setupFormListener();
            }

            trackVisitor() {
                const today = new Date().toDateString();
                const data = this.getData();
                
                if (data.lastVisit !== today) {
                    data.visitors += 1;
                    data.lastVisit = today;
                    this.saveData(data);
                }
            }

            getData() {
                const stored = localStorage.getItem(this.storageKey);
                return stored ? JSON.parse(stored) : {
                    visitors: 0,
                    inquiries: 0,
                    lastVisit: new Date().toDateString()
                };
            }

            saveData(data) {
                localStorage.setItem(this.storageKey, JSON.stringify(data));
            }

            getInquiries() {
                const stored = localStorage.getItem(this.inquiriesKey);
                return stored ? JSON.parse(stored) : [];
            }

            addInquiry(name, email, message) {
                const inquiries = this.getInquiries();
                const inquiry = {
                    id: Date.now(),
                    name,
                    email,
                    message,
                    time: new Date().toLocaleString(),
                    source: 'Form Submission',
                    userAgent: navigator.userAgent.includes('Mobile') ? 'Mobile' : 'Desktop'
                };
                inquiries.unshift(inquiry);
                localStorage.setItem(this.inquiriesKey, JSON.stringify(inquiries));

                // Update stats
                const data = this.getData();
                data.inquiries += 1;
                this.saveData(data);

                // Send to Telegram
                this.sendToTelegram(inquiry);
            }

            sendToTelegram(inquiry) {
                const message = `
🎯 NEW INQUIRY - TRAVKA

👤 Name: ${inquiry.name}
📧 Email: ${inquiry.email}
💬 Message: ${inquiry.message}
⏰ Time: ${inquiry.time}
📱 Device: ${inquiry.userAgent}

Reply: https://t.me/soprano67_1
                `;

                // Using webhook or simple fetch to Telegram Bot API
                // This is a placeholder - you'd need a backend service
                console.log('Inquiry to send to Telegram:', inquiry);
            }

            loadData() {
                this.updateDashboard();
            }

            updateDashboard() {
                const data = this.getData();
                const inquiries = this.getInquiries().length;
                const conversion = data.visitors > 0 ? Math.round((inquiries / data.visitors) * 100) : 0;

                document.getElementById('stat-visitors').textContent = data.visitors;
                document.getElementById('stat-inquiries').textContent = inquiries;
                document.getElementById('stat-conversion').textContent = conversion + '%';

                document.getElementById('admin-total-visitors').textContent = data.visitors;
                document.getElementById('admin-total-inquiries').textContent = inquiries;
                document.getElementById('admin-conversion').textContent = conversion + '%';

                this.updateInquiriesTable();
            }

            updateInquiriesTable() {
                const inquiries = this.getInquiries();
                const tbody = document.getElementById('inquiriesList');

                if (inquiries.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#aaa;">No inquiries yet</td></tr>';
                    return;
                }

                tbody.innerHTML = inquiries.map(inq => `
                    <tr>
                        <td>${inq.name}</td>
                        <td>${inq.email}</td>
                        <td>${inq.message.substring(0, 30)}...</td>
                        <td>${inq.time}</td>
                        <td>${inq.userAgent}</td>
                    </tr>
                `).join('');
            }

            setupFormListener() {
                const form = document.getElementById('contactForm');
                if (!form) return;

                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = document.getElementById('name').value;
                    const email = document.getElementById('email').value;
                    const message = document.getElementById('message').value;

                    this.addInquiry(name, email, message);

                    // Show success message
                    alert('✅ Thank you! We received your inquiry. Check Telegram @soprano67_1 for quick response!');
                    form.reset();
                    this.updateDashboard();
                });
            }
        }

        // Export to CSV
        function exportData() {
            const analytics = new TravkaAnalytics();
            const inquiries = analytics.getInquiries();
            
            let csv = 'Name,Email,Message,Time,Device\n';
            inquiries.forEach(inq => {
                csv += `"${inq.name}","${inq.email}","${inq.message}","${inq.time}","${inq.userAgent}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `travka_inquiries_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        // Admin Panel Functions
        function showAdmin(event) {
            event.preventDefault();
            // Simple password protection
            const password = prompt('Enter admin password:');
            if (password === 'soprano67') {
                document.getElementById('adminPanel').style.display = 'flex';
                analytics.updateDashboard();
            } else {
                alert('❌ Incorrect password');
            }
        }

        function closeAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        // Initialize Analytics
        const analytics = new TravkaAnalytics();

        // Smooth scroll
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                const href = this.getAttribute('href');
                if (href !== '#admin') {
                    e.preventDefault();
                    const target = document.querySelector(href);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth' });
                    }
                }
            });
        });

        // Mouse follow glow effect
        document.addEventListener('mousemove', (e) => {
            const glows = document.querySelectorAll('.glow-overlay');
            glows.forEach((glow, index) => {
                const speed = index === 0 ? 0.1 : 0.05;
                const x = (e.clientX * speed) - glow.offsetWidth / 2;
                const y = (e.clientY * speed) - glow.offsetHeight / 2;
                glow.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            });
        });

        // Close modal when clicking outside
        document.getElementById('adminPanel')?.addEventListener('click', (e) => {
            if (e.target.id === 'adminPanel') {
                closeAdmin();
            }
        });
    </script>
</body>
</html>
